<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nexus Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="login.html" class="logo">Nexus Store</a>
    </header>

    <main>
        <div class="login-container" id="login-container">
            <h1>Sign In to Your Account</h1>
            <div id="login-error" style="color: var(--error); text-align: center; margin-bottom: 1rem; display: none;">Invalid credentials</div>
            <form id="mock-login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@company.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
            <p style="text-align: center; margin-top: 1rem;">Don't have an account? <a href="#" id="show-signup" style="color: var(--secondary);">Sign Up</a></p>
        </div>

        <div class="login-container" id="signup-container" style="display: none;">
            <h1>Create an Account</h1>
            <div id="signup-error" style="color: var(--error); text-align: center; margin-bottom: 1rem; display: none;">User already exists</div>
            <form id="mock-signup-form">
                <div class="input-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" required placeholder="name@company.com">
                </div>
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
            <p style="text-align: center; margin-top: 1rem;">Already have an account? <a href="#" id="show-login" style="color: var(--secondary);">Sign In</a></p>
        </div>
    </main>

    <footer>
        <p>Nexus Store Testbed • System Time: <span class="dynamic-clock">Loading...</span></p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
